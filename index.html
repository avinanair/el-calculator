<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL Calculator Pro</title>
    <style>
        :root { 
            --primary: #1e40af; 
            --secondary: #64748b;
            --bg: #f1f5f9; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { color: #0f172a; text-align: center; margin-bottom: 24px; font-weight: 800; }
        
        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 14px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        
        button { 
            flex: 2;
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        .btn-reset { 
            flex: 1;
            background: #e2e8f0; 
            color: #475569; 
        }
        button:active { opacity: 0.8; }

        #result-area { 
            margin-top: 24px; 
            padding: 20px; 
            border-radius: 12px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0;
            display: none; 
            text-align: center; 
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-label { color: #64748b; font-size: 14px; margin-bottom: 5px; }
        .days-highlight { font-size: 32px; color: var(--primary); font-weight: 800; }
        .net-days { font-size: 12px; color: #94a3b8; margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>EL Calculator</h2>
    
    <div class="input-group">
        <label>From Date</label>
        <input type="date" id="fromDate">
    </div>

    <div class="input-group">
        <label>To Date</label>
        <input type="date" id="toDate">
    </div>

    <div class="input-group">
        <label>Other Leave Taken (Days)</label>
        <input type="number" id="otherLeave" placeholder="0" min="0">
    </div>

    <div class="btn-container">
        <button onclick="calculateEL()">Calculate</button>
        <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>

    <div id="result-area">
        <div class="result-label">Earned Leave (EL) Result:</div>
        <div class="days-highlight" id="elResult">0</div>
        <div class="net-days" id="breakdown"></div>
    </div>
</div>

<script>
    function calculateEL() {
        const fromVal = document.getElementById('fromDate').value;
        const toVal = document.getElementById('toDate').value;
        const other = parseInt(document.getElementById('otherLeave').value) || 0;

        if (!fromVal || !toVal) {
            alert("Please select both From and To dates.");
            return;
        }

        const from = new Date(fromVal);
        const to = new Date(toVal);

        if (to < from) {
            alert("To Date cannot be earlier than From Date!");
            return;
        }

        // Calculate total days (inclusive of both dates)
        const diffTime = to - from;
        const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        const netWorkingDays = totalDays - other;

        if (netWorkingDays < 0) {
            alert("Other Leaves cannot be more than the total days in the period!");
            return;
        }

        // Calculation: 1 day for every 11 days
        const fullDays = Math.floor(netWorkingDays / 11);
