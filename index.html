<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL Calculator</title>
    <style>
        :root { --primary: #1e40af; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 24px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #1e293b; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #475569; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 2; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-reset { flex: 1; background: #94a3b8; }
        #result-area { margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 10px; display: none; text-align: center; }
        .res-big { font-size: 28px; color: var(--primary); font-weight: 800; margin: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>EL Calculator</h2>
    
    <label>From Date</label>
    <input type="date" id="fromDate">

    <label>To Date</label>
    <input type="date" id="toDate">

    <label>Other Leave Taken</label>
    <input type="number" id="otherLeave" value="0">

    <div class="btn-group">
        <button onclick="calculateEL()">Calculate</button>
        <button class="btn-reset" onclick="window.location.reload()">Reset</button>
    </div>

    <div id="result-area">
        <div style="color: #64748b;">Earned Leave:</div>
        <div class="res-big" id="elResult"></div>
        <div id="breakdown" style="font-size: 12px; color: #94a3b8;"></div>
    </div>
</div>

<script>
    function calculateEL() {
        try {
            const fromStr = document.getElementById('fromDate').value;
            const toStr = document.getElementById('toDate').value;
            const other = parseInt(document.getElementById('otherLeave').value) || 0;

            if (!fromStr || !toStr) {
                alert("Please select both dates.");
                return;
            }

            const fromDate = new Date(fromStr);
            const toDate = new Date(toStr);

            if (toDate < fromDate) {
                alert("To Date cannot be before From Date.");
                return;
            }

            // Calculate Difference
            const diffInMs = toDate - fromDate;
            const totalDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24)) + 1;
            
            const netDays = totalDays - other;

            if (netDays < 0) {
                alert("Leaves taken cannot be more than total days.");
                return;
            }

            // Your specific math: X - Y/11
            const fullDays = Math.floor(netDays / 11);
            const remainder = netDays % 11;

            let resultText = "";
            if (remainder === 0) {
                resultText = fullDays;
            } else {
                resultText = fullDays + " - " + remainder + "/11";
            }

            // Show result
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('elResult').innerText = resultText;
            document.getElementById('breakdown').innerText = "Net Working Days: " + netDays;

        } catch (err) {
            alert("An error occurred: " + err.message);
        }
    }
</script>

</body>
</html>
