<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL Calculator</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1e293b; margin-top: 0; text-align: center; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; color: #475569; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; margin-top: 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #result-area { margin-top: 20px; padding: 15px; border-radius: 8px; background: #eff6ff; display: none; text-align: center; }
        .days-highlight { font-size: 24px; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>

<div class="card">
    <h2>EL Calculator</h2>
    
    <label>From Date</label>
    <input type="date" id="fromDate">

    <label>To Date</label>
    <input type="date" id="toDate">

    <label>Other Leave Taken (Days)</label>
    <input type="number" id="otherLeave" placeholder="0" min="0">

    <button onclick="calculateEL()">Calculate Earned Leave</button>

    <div id="result-area">
        <div style="color: #64748b;">Your Earned Leave is:</div>
        <div class="days-highlight" id="elResult">0</div>
        <div id="breakdown" style="font-size: 12px; color: #94a3b8; margin-top: 8px;"></div>
    </div>
</div>

<script>
    function calculateEL() {
        const from = new Date(document.getElementById('fromDate').value);
        const to = new Date(document.getElementById('toDate').value);
        const other = parseInt(document.getElementById('otherLeave').value) || 0;

        if (isNaN(from) || isNaN(to)) {
            alert("Please select both dates!");
            return;
        }

        if (to < from) {
            alert("To Date cannot be before From Date!");
            return;
        }

        // Calculate total days including the last day
        const diffTime = to - from;
        const totalDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        const netWorkingDays = totalDays - other;
        
        // Using standard formula: 1 EL for every 11 days worked
        const elEarned = Math.floor(netWorkingDays / 11);

        document.getElementById('result-area').style.display = 'block';
        document.getElementById('elResult').innerText = elEarned + " Days";
        document.getElementById('breakdown').innerText = `Based on ${netWorkingDays} net working days`;
    }
</script>

</body>
</html>
