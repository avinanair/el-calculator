<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSR Service Suite - Final Version</title>
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --success: #059669; 
            --warning: #d97706; --danger: #dc2626; --bg: #f1f5f9; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .app-container { max-width: 550px; margin: 15px auto; background: white; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; }
        
        .nav-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .nav-tab { flex: 1; padding: 16px 5px; border: none; background: none; font-size: 11px; font-weight: 700; color: #64748b; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-tab.active { color: var(--accent); background: white; border-bottom: 3px solid var(--accent); }

        .content { padding: 25px; display: none; }
        .content.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin: 0 0 20px 0; font-size: 1.1rem; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; box-sizing: border-box; background: #fcfdfe; }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; color: white; }
        .btn-calc { background: var(--accent); }
        
        .result-panel { margin-top: 25px; padding: 20px; border-radius: 18px; display: none; border: 1px solid #e2e8f0; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; }
        .big-result { font-size: 24px; font-weight: 800; text-align: center; margin: 10px 0; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; display: inline-block; }
        .badge-pension { background: #dcfce7; color: #166534; }
        .badge-dcrg { background: #e0f2fe; color: #075985; }
        .cap-note { font-size: 10px; color: var(--danger); font-weight: bold; display: block; text-align: center; }
        .note { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="tab(event, 'qs')">Pension/DCRG</button>
        <button class="nav-tab" onclick="tab(event, 'el')">EL</button>
        <button class="nav-tab" onclick="tab(event, 'prob')">Probation</button>
        <button class="nav-tab" onclick="tab(event, 'ret')">Retire</button>
    </div>

    <div id="qs" class="content active">
        <h2>Qualifying Service (QS)</h2>
        <div class="input-group"><label>Joining Date</label><input type="date" id="qs_s"></div>
        <div class="input-group"><label>Retirement Date</label><input type="date" id="qs_e"></div>
        <div class="input-group"><label>LWA without MC (Days)</label><input type="number" id="qs_lwa" value="0"></div>
        <button class="btn-calc" onclick="calcQS()" style="background: var(--success);">Calculate QS</button>
        
        <div id="res_qs" class="result-panel" style="background: #f0fdfa;">
            <div class="res-row">Actual Net Service: <b id="qs_net"></b></div>
            <div class="res-row">Leap Days (+): <b id="qs_leap"></b></div>
            <hr style="border: 0.5px solid #ccfbf1; margin: 15px 0;">
            
            <span class="badge badge-pension">Pension QS (Rule 64 Cap)</span>
            <div class="big-result" id="qs_p_val" style="color: var(--success);"></div>
            <div id="p_cap" class="cap-note"></div>
            
            <span class="badge badge-dcrg" style="margin-top:15px;">DCRG QS (Rule 68 Cap)</span>
            <div class="big-result" id="qs_d_val" style="color: #0369a1;"></div>
            <div id="d_cap" class="cap-note"></div>
        </div>
    </div>

    <div id="el" class="content">
        <h2>Earned Leave (Rule 78)</h2>
        <div class="input-group"><label>From</label><input type="date" id="el_s"></div>
        <div class="input-group"><label>To</label><input type="date" id="el_e"></div>
        <div class="input-group"><label>Deductions (Days)</label><input type="number" id="el_lwa" value="0"></div>
        <div class="input-group"><label>Ratio</label><select id="el_r"><option value="11">Non-Vacation (1/11)</option><option value="22">Vacation (1/22)</option></select></div>
        <button class="btn-calc" onclick="calcEL()">Calculate EL</button>
        <div id="res_el" class="result-panel" style="background: #f0fdf4;"><div class="big-result" id="el_val" style="color: var(--success);"></div></div>
    </div>

    <div id="prob" class="content">
        <h2>Probation (KSSSR)</h2>
        <div class="input-group"><label>Joining Date</label><input type="date" id="pb_s"></div>
        <div class="input-group"><label>Period (Years)</label><input type="number" id="pb_y" value="2"></div>
        <div class="input-group"><label>LWA Days</label><input type="number" id="pb_lwa" value="0"></div>
        <button class="btn-calc" onclick="calcProb()" style="background: var(--warning);">Check Completion</button>
        <div id="res_pb" class="result-panel" style="background: #fffbeb;">
            <div class="res-row">Completion: <b id="pb_c"></b></div>
            <div class="res-row">Declaration (FN): <b id="pb_d"></b></div>
        </div>
    </div>

    <div id="ret" class="content">
        <h2>Retirement Date</h2>
        <div class="input-group"><label>Date of Birth</label><input type="date" id="dob"></div>
        <div class="input-group"><label>Age</label><input type="number" id="ra" value="56"></div>
        <button class="btn-calc" onclick="calcRet()" style="background: var(--primary);">Find Date</button>
        <div id="res_ret" class="result-panel" style="background: #f8fafc;"><div class="big-result" id="ret_val" style="color: var(--danger);"></div></div>
    </div>
</div>

<script>
    function tab(e, n) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(n).classList.add('active'); e.currentTarget.classList.add('active');
    }

    function calcQS() {
        let s = new Date(document.getElementById('qs_s').value), e = new Date(document.getElementById('qs_e').value);
        let lwa = parseInt(document.getElementById('qs_lwa').value) || 0;
        if(isNaN(s) || isNaN(e)) return;

        let leap = 0;
        for(let y = s.getFullYear(); y <= e.getFullYear(); y++) {
            let ld = new Date(y, 1, 29);
            if(ld >= s && ld <= e) leap++;
        }

        let totalDays = Math.floor((e - s) / 86400000) + 1 + leap - lwa;
        let yy = Math.floor(totalDays / 365.25), mm = Math.floor((totalDays % 365.25) / 30.44), dd = Math.floor((totalDays % 365.25) % 30.44);

        document.getElementById('qs_net').innerText = `${yy}y, ${mm}m, ${dd}d`;
        document.getElementById('qs_leap').innerText = `+${leap} Days`;

        // Pension (Rule 57 & Rule 64 Cap)
        let pY = (mm >= 6) ? yy + 1 : yy;
        let pFinal = pY; 
        document.getElementById('p_cap').innerText = "";
        if(pY > 30) { pFinal = 30; document.getElementById('p_cap').innerText = "Capped at Max 30 Years"; }
        document.getElementById('qs_p_val').innerText = pFinal + " Years";

        // DCRG (Rule 68 Cap)
        let pds = yy * 2;
        if(mm >= 3 && mm < 9) pds += 1; else if(mm >= 9) pds += 2;
        let dFinal = pds;
        document.getElementById('d_cap').innerText = "";
        if(pds > 66) { dFinal = 66; document.getElementById('d_cap').innerText = "Capped at Max 33 Years (66 Periods)"; }
        document.getElementById('qs_d_val').innerText = dFinal + " Periods (" + (dFinal/2) + "y)";
        
        document.getElementById('res_qs').style.display = 'block';
    }

    function calcEL() {
        let s = new Date(document.getElementById('el_s').value), e = new Date(document.getElementById('el_e').value), l = parseInt(document.getElementById('el_lwa').value) || 0, r = parseInt(document.getElementById('el_r').value);
        if(isNaN(s) || isNaN(e)) return;
        let d = Math.floor((e - s) / 86400000) + 1 - l;
        document.getElementById('el_val').innerText = (d/r).toFixed(2) + " Days Accrued";
        document.getElementById('res_el').style.display = 'block';
    }

    function calcProb() {
        let s = new Date(document.getElementById('pb_s').value), y = parseInt(document.getElementById('pb_y').value), l = parseInt(document.getElementById('pb_lwa').value) || 0;
        if(isNaN(s)) return;
        let c = new Date(s); c.setFullYear(s.getFullYear() + y); c.setDate(c.getDate() - 1 + l);
        let d = new Date(c); d.setDate(d.getDate() + 1);
        document.getElementById('pb_c').innerText = c.toLocaleDateString('en-GB');
        document.getElementById('pb_d').innerText = d.toLocaleDateString('en-GB');
        document.getElementById('res_pb').style.display = 'block';
    }

    function calcRet() {
        let b = new Date(document.getElementById('dob').value), a = parseInt(document.getElementById('ra').value);
        if(isNaN(b)) return;
        let r = (b.getDate() === 1) ? new Date(b.getFullYear() + a, b.getMonth(), 0) : new Date(b.getFullYear() + a, b.getMonth() + 1, 0);
        document.getElementById('ret_val').innerText = r.toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'});
        document.getElementById('res_ret').style.display = 'block';
    }
</script>
</body>
</html>
